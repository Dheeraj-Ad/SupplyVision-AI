version: "3.8"

services:
  # Relational DB & Caching fallback are SQLite/In-memory but we can run Redis & Neo4j for Production simulation
  redis:
    image: redis:7-alpine
    container_name: supplyvision_redis
    ports:
      - "6379:6379"
    restart: always

  neo4j:
    image: neo4j:5.18.0-community
    container_name: supplyvision_neo4j
    ports:
      - "7474:7474" # HTTP Console
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    restart: always

  backend:
    build: ./backend
    container_name: supplyvision_backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=super-secret-key-replace-in-production
      - DATABASE_URL=sqlite:////workspace/data/supplyvision.db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend_data:/workspace/data
    depends_on:
      - redis
      - neo4j
    restart: always

  frontend:
    build: ./frontend
    container_name: supplyvision_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: always

volumes:
  neo4j_data:
  backend_data:
