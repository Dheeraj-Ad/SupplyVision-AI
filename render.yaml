services:
  - type: web
    name: supplyvision-backend
    env: docker
    dockerfilePath: SupplyVision AI/backend/Dockerfile
    dockerContext: SupplyVision AI/backend
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: SECURE_COOKIES
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
